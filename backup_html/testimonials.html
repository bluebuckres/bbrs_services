<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>BlueBuck Partner Testimonials</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&amp;family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#10b981", // Emerald 500
                        "background-light": "#f8fafc",
                        "background-dark": "#0a0a0a", // Deep charcoal/matt black
                        "accent-green": "#10b981",
                    },
                    fontFamily: {
                        display: ["DM+Serif+Display", "serif"],
                        sans: ["Inter", "sans-serif"],
                        mono: ["Space+Grotesk", "monospace"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
    <style>
        .custom-slider-gradient {
            background: linear-gradient(90deg, #10b981 0%, rgba(16, 185, 129, 0.2) 100%);
        }

        .text-spacing-wide {
            letter-spacing: 0.2em;
        }

        .glow-emerald {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white transition-colors duration-300 font-sans min-h-screen flex items-center justify-center p-6 md:p-12">
    <div class="max-w-7xl w-full mx-auto space-y-12">
        <header class="border-b border-slate-200 dark:border-white/10 pb-4 flex justify-between items-end">
            <div>
                <span class="font-display text-xs text-spacing-wide uppercase tracking-[0.3em] opacity-80">What Our
                    Partners Say</span>
                <div class="h-1 w-12 bg-primary mt-2"></div>
            </div>
            <div class="hidden md:block">
                <span class="text-xs font-mono opacity-50 uppercase tracking-widest">Case Study 04 / 13</span>
            </div>
        </header>
        <main class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-20 items-stretch">
            <div class="lg:col-span-5 relative group">
                <div class="aspect-[4/5] overflow-hidden rounded-sm relative">
                    <img alt="Amit Singh, CTO at TechCore"
                        class="w-full h-full object-cover grayscale-[0.2] contrast-110 hover:scale-105 transition-transform duration-700"
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAcWF8CqzNgSiivFl2pgBXnPdznARggBQclyllQ8d8j5VCXxaRgizNT5rQXAlV-516Q40LAKVtymppkCotWPuKvQlCNb6KCs9vVnQKKcsfsFO0YHHR8Dcg5RxRBKUzbDiw5Dev843u4x3SdRp2UfbqO1jz_IzViycVcw4_wJDIxqC2FB-1Ow6H6YpLcF0HvMSVKzOsAif1UBeVWQQJYHg-eBMiHUgtdt5puIA0C4yMVHvH47v2G6-b0904bqUurSTNZLG6yU9O-vvf" />
                    <div class="absolute top-4 left-4">
                        <span class="material-icons-outlined text-white opacity-40 text-sm">add</span>
                    </div>
                    <div class="absolute top-4 right-4">
                        <span class="material-icons-outlined text-white opacity-40 text-sm">add</span>
                    </div>
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex flex-col justify-end p-8">
                        <div class="flex items-end justify-between mb-4">
                            <div class="space-y-1">
                                <span class="block text-[10px] font-mono tracking-widest uppercase opacity-70">Reduced
                                    Dev Time</span>
                                <div class="relative w-48 h-[2px] bg-white/20">
                                    <div class="absolute left-0 top-0 h-full w-[60%] bg-white"></div>
                                    <div class="absolute left-[60%] top-1/2 -translate-y-1/2 -translate-x-1/2">
                                        <div
                                            class="w-4 h-4 rounded-full bg-white flex items-center justify-center glow-emerald">
                                            <span
                                                class="material-icons-outlined text-primary text-[10px] font-bold">add</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <span class="text-6xl md:text-7xl font-display leading-none">60%</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-7 flex flex-col justify-between py-4">
                <div class="space-y-12">
                    <div class="flex items-center gap-2 opacity-90">
                        <div class="grid grid-cols-3 gap-1">
                            <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                            <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                            <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                            <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                            <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                            <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                        </div>
                        <span class="text-xl font-bold tracking-tight">TechCore</span>
                        <span
                            class="text-[10px] font-mono uppercase tracking-[0.2em] opacity-40 ml-2 border-l border-white/20 pl-2">Innovating
                            Future</span>
                    </div>
                    <blockquote class="relative">
                        <p
                            class="text-3xl md:text-4xl lg:text-5xl font-light leading-tight tracking-tight dark:text-slate-100">
                            "BlueBuck is a <span class="font-display italic">vital partner</span> in how we accelerate
                            our roadmap and maintain our competitive edge."
                        </p>
                    </blockquote>
                    <div>
                        <a class="group inline-flex flex-col" href="#">
                            <span
                                class="text-xs font-mono tracking-[0.3em] uppercase opacity-70 group-hover:opacity-100 transition-opacity">Read
                                Full Story</span>
                            <div class="h-[1px] w-0 group-hover:w-full bg-primary transition-all duration-300 mt-1">
                            </div>
                        </a>
                    </div>
                </div>
                <div class="mt-16 lg:mt-0 flex flex-col md:flex-row items-start md:items-center justify-between gap-8">
                    <div class="px-6 py-4 border border-slate-200 dark:border-white/10 rounded-sm">
                        <p class="font-mono text-xs tracking-widest uppercase flex items-center gap-3">
                            <span class="text-primary font-bold">Amit Singh</span>
                            <span class="opacity-30">|</span>
                            <span class="opacity-60">CTO @ TechCore</span>
                        </p>
                    </div>
                    <div class="flex items-center gap-4">
                        <button
                            class="w-12 h-12 flex items-center justify-center border border-slate-200 dark:border-white/10 hover:bg-white/5 transition-colors rounded-sm group">
                            <span
                                class="material-icons-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
                        </button>
                        <button
                            class="w-12 h-12 flex items-center justify-center border border-slate-200 dark:border-white/10 hover:bg-white/5 transition-colors rounded-sm group">
                            <span
                                class="material-icons-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>
        <div class="fixed top-12 right-12 opacity-5 pointer-events-none hidden lg:block">
            <span class="text-[20rem] font-display leading-none">"</span>
        </div>
    </div>
    <div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[30%] h-[30%] bg-emerald-900/10 blur-[100px] rounded-full">
        </div>
    </div>

</body>

</html>
